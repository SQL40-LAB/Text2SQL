database: analytics
description: 마케팅·웹 로그 분석 스키마
aliases: [마케팅, 분석, analytics, 로그, 웹로그]
tables:
  - name: campaigns
    description: 마케팅 캠페인
    aliases: [캠페인, campaign, campaigns, 광고]
    columns:
      - name: campaign_id
        type: INTEGER
        description: 캠페인 ID
        primary_key: true
        aliases: [캠페인번호]
      - name: campaign_name
        type: VARCHAR(200)
        description: 캠페인명
        aliases: [캠페인이름, 광고명]
      - name: channel
        type: VARCHAR(50)
        description: 채널 (EMAIL, SNS, SEARCH)
        aliases: [채널, 매체]
      - name: start_date
        type: DATE
        description: 시작일
        aliases: [시작, 캠페인시작]
      - name: end_date
        type: DATE
        description: 종료일
        aliases: [종료, 캠페인종료]
      - name: budget
        type: DECIMAL(14, 2)
        description: 예산
        aliases: [광고비, 예산금액]

  - name: page_views
    description: 페이지 조회 로그
    aliases: [페이지뷰, 조회, page_views, 방문, 트래픽]
    columns:
      - name: view_id
        type: BIGINT
        description: 조회 ID
        primary_key: true
      - name: user_id
        type: VARCHAR(64)
        description: 방문자 식별자
        aliases: [방문자, 사용자]
      - name: page_url
        type: VARCHAR(500)
        description: 페이지 URL
        aliases: [url, 페이지, 주소]
      - name: viewed_at
        type: TIMESTAMP
        description: 조회 시각
        aliases: [조회시각, 방문시각]
      - name: session_id
        type: VARCHAR(64)
        description: 세션 ID
        aliases: [세션]
      - name: device_type
        type: VARCHAR(20)
        description: 기기 유형 (MOBILE, DESKTOP, TABLET)
        aliases: [기기, 디바이스, 모바일, pc]

  - name: conversions
    description: 전환(구매·가입 등) 이벤트
    aliases: [전환, conversion, conversions, 구매전환, 가입전환]
    columns:
      - name: conversion_id
        type: BIGINT
        description: 전환 ID
        primary_key: true
      - name: user_id
        type: VARCHAR(64)
        description: 사용자 ID
      - name: campaign_id
        type: INTEGER
        description: 캠페인 ID (campaigns.campaign_id)
        foreign_key: campaigns.campaign_id
      - name: conversion_type
        type: VARCHAR(50)
        description: 전환 유형 (SIGNUP, PURCHASE)
        aliases: [전환유형, 가입, 구매]
      - name: converted_at
        type: TIMESTAMP
        description: 전환 시각
        aliases: [전환일시, 전환시각]
      - name: revenue
        type: DECIMAL(12, 2)
        description: 전환 매출
        aliases: [매출, 수익, revenue]

  - name: daily_metrics
    description: 일별 집계 지표
    aliases: [일별지표, 일별집계, daily_metrics, 성과]
    columns:
      - name: metric_date
        type: DATE
        description: 기준일
        primary_key: true
        aliases: [날짜, 일자, 기준일자]
      - name: campaign_id
        type: INTEGER
        description: 캠페인 ID
        foreign_key: campaigns.campaign_id
      - name: impressions
        type: INTEGER
        description: 노출 수
        aliases: [노출, impression, impressions]
      - name: clicks
        type: INTEGER
        description: 클릭 수
        aliases: [클릭, click]
      - name: conversions
        type: INTEGER
        description: 전환 수
        aliases: [전환수, 전환건수]
      - name: spend
        type: DECIMAL(12, 2)
        description: 광고비
        aliases: [지출, 광고비용, 비용]
